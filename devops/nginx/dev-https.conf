worker_processes 1;

events {
  worker_connections 1024;
}

http {
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Upstream targets keep existing ports/services intact.
  upstream voicehub_vite {
    server 127.0.0.1:5173;
  }

  upstream voicehub_gateway {
    server 127.0.0.1:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 443 ssl;
    server_name voicehub.local;

    # Replace with actual files generated by mkcert in devops/nginx/certs.
    ssl_certificate     certs/voicehub.local+3.pem;
    ssl_certificate_key certs/voicehub.local+3-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    # Forward original scheme/host so gateway/app can build correct URLs.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Frontend app
    location / {
      proxy_pass http://voicehub_vite;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # API Gateway REST
    location /api/ {
      proxy_pass http://voicehub_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;
    }

    # Chat realtime socket.io via gateway
    location /socket.io/ {
      proxy_pass http://voicehub_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Voice signaling socket.io path via gateway
    location /voice-socket/ {
      proxy_pass http://voicehub_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}

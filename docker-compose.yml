# Entry mặc định: gộp infra (Mongo/Redis) + core (API + services).
# Compose v2.24+ (include).
# Biến môi trường chung: tạo/sửa file `.env` ở root repo (Compose tự đọc cho ${VAR} và env_file trong docker-compose.core.yml).
#
# Chạy full (prod-like, không nodemon):
#   docker compose up -d --build
#
# Dev (hot reload):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Chỉ infra:
#   docker compose -f docker-compose.infra.yml up -d
#
# Chỉ core (cần Mongo/Redis đã chạy):
#   docker compose -f docker-compose.core.yml up -d

include:
  - docker-compose.infra.yml
  - docker-compose.core.yml

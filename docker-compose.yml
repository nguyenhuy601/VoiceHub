
services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: enterprise-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - enterprise-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: enterprise-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - user-service
      - friend-service
      - organization-service
      - role-permission-service
      - chat-service
      - voice-service
      - task-service
      - document-service
      - notification-service
      - webhook-service
    networks:
      - enterprise-network
    volumes:
      - ./api-gateway:/app
      - /app/node_modules

  # Auth Service
  auth-service:
    build: ./services/auth-service
    container_name: enterprise-auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/auth-service:/app
      - ./shared:/shared
      - /app/node_modules

  # User Service
  user-service:
    build: ./services/user-service
    container_name: enterprise-user-service
    ports:
      - "3004:3004"
    env_file:
      - ./services/user-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/user-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Organization Service
  organization-service:
    build: ./services/organization-service
    container_name: enterprise-organization-service
    ports:
      - "3013:3013"
    env_file:
      - ./services/organization-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/organization-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Friend Service
  friend-service:
    build: ./services/friend-service
    container_name: enterprise-friend-service
    ports:
      - "3014:3014"
    env_file:
      - ./services/friend-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - mongodb
      - redis
      - auth-service
      - user-service
    networks:
      - enterprise-network
    volumes:
      - ./services/friend-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Role & Permission Service
  role-permission-service:
    build: ./services/role-permission-service
    container_name: enterprise-role-permission-service
    ports:
      - "3015:3015"
    env_file:
      - ./services/role-permission-service/.env
    depends_on:
      - mongodb
      - redis
      - organization-service
    networks:
      - enterprise-network
    volumes:
      - ./services/role-permission-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Chat Service
  chat-service:
    build: ./services/chat-service
    container_name: enterprise-chat-service
    ports:
      - "3006:3006"
    env_file:
      - ./services/chat-service/.env
    depends_on:
      - mongodb
      - redis
      - user-service
      - organization-service
    networks:
      - enterprise-network
    volumes:
      - ./services/chat-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Task Service
  task-service:
    build: ./services/task-service
    container_name: enterprise-task-service
    ports:
      - "3009:3009"
    env_file:
      - ./services/task-service/.env
    depends_on:
      - mongodb
      - redis
      - organization-service
    networks:
      - enterprise-network
    volumes:
      - ./services/task-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Document Service
  document-service:
    build: ./services/document-service
    container_name: enterprise-document-service
    ports:
      - "3010:3010"
    env_file:
      - ./services/document-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/document-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Voice Service
  voice-service:
    build: ./services/voice-service
    container_name: enterprise-voice-service
    ports:
      - "3005:3005"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    env_file:
      - ./services/voice-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/voice-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: sh -c "npm install && node src/server.js"

  # Notification Service
  notification-service:
    build: ./services/notification-service
    container_name: enterprise-notification-service
    ports:
      - "3003:3003"
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/notification-service:/app
      - ./shared:/shared
      - /app/node_modules

  # Webhook Service (FastAPI)
  webhook-service:
    build: ./services/webhook-service
    container_name: enterprise-webhook-service
    ports:
      - "3016:3016"
    env_file:
      - ./services/webhook-service/.env
    depends_on:
      - notification-service
    networks:
      - enterprise-network
    volumes:
      - ./services/webhook-service:/app

  # Socket Service (Socket.IO server riêng)
  socket-service:
    build: ./services/socket-service
    container_name: enterprise-socket-service
    expose:
      - "3017"
    env_file:
      - ./services/socket-service/.env
    depends_on:
      - chat-service
      - auth-service
    networks:
      - enterprise-network
    volumes:
      - ./services/socket-service:/app
      - ./shared:/shared
      - /app/node_modules

volumes:
  mongodb_data:
  redis_data:

networks:
  enterprise-network:
    driver: bridge


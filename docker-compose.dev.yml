# Dev: bind mount (./services/…:/app, ./shared:/shared trong core) + nodemon + CHOKIDAR polling (Windows/WSL).
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Mọi service Node trong core đều có entry tương ứng ở đây (npm run dev). Python: webhook-service dùng uvicorn --reload.

services:
  api-gateway:
    # npm ci theo lockfile (commit trong git); fallback npm install nếu chưa có lock.
    command: ["sh", "-c", "npm ci || npm install; npm run dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  auth-service:
    command: ["sh", "-c", "npm ci || npm install; npm run dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"


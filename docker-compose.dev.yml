# Dev: nodemon + file polling (Windows/WSL).
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  api-gateway:
    # npm install: đồng bộ node_modules trong volume với package.json sau khi thêm dependency
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  auth-service:
    command: ["npm", "run", "dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  user-service:
    command: ["npm", "run", "dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  organization-service:
    command: ["npm", "run", "dev"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

  friend-service:
    command: ["npm", "run", "dev"]

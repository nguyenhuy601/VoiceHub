# Core: API Gateway + microservices (không gồm Mongo/Redis — xem docker-compose.infra.yml)
# File này được gộp qua docker-compose.yml (include). Hoặc chạy tay:
# docker compose -f docker-compose.infra.yml -f docker-compose.core.yml up -d
#
# Biến chung (token, RabbitMQ, …): file .env ở root repo — mọi service dùng env_file: [.env, ./services/.../.env]
#
# Bề mặt mạng: chỉ publish api-gateway (+ voice-service cho WebRTC). Các service khác chỉ enterprise-network.
# Debug trực tiếp một service: docker compose exec <service> wget … hoặc thêm ports: tạm thời.

services:
  api-gateway:
    build: ./api-gateway
    container_name: enterprise-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
      - ./api-gateway/.env
    # GATEWAY_INTERNAL_TOKEN: chỉ từ .env gốc + api-gateway/.env (tránh environment: ghi đè bằng chuỗi rỗng khi biến host trống trên Windows)
    depends_on:
      - auth-service
      - user-service
      - friend-service
      - organization-service
      - role-permission-service
      - chat-service
      - voice-service
      - task-service
      - ai-task-service
      - document-service
      - notification-service
      - webhook-service
    networks:
      - enterprise-network
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    # Đồng bộ node_modules trong volume với package.json (tránh MODULE_NOT_FOUND sau khi thêm dependency)
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  auth-service:
    build: ./services/auth-service
    container_name: enterprise-auth-service
    env_file:
      - .env
      - ./services/auth-service/.env
    environment:
      - USER_SERVICE_INTERNAL_TOKEN=${USER_SERVICE_INTERNAL_TOKEN}
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/auth-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  user-service:
    build: ./services/user-service
    container_name: enterprise-user-service
    env_file:
      - .env
      - ./services/user-service/.env
    environment:
      - USER_SERVICE_INTERNAL_TOKEN=${USER_SERVICE_INTERNAL_TOKEN}
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/user-service:/app
      - ./shared:/shared
      - /app/node_modules
    # Đồng bộ node_modules trong volume với package.json (axios, v.v.) — tránh MODULE_NOT_FOUND
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  organization-service:
    build: ./services/organization-service
    container_name: enterprise-organization-service
    env_file:
      - .env
      - ./services/organization-service/.env
    environment:
      - NOTIFICATION_INTERNAL_TOKEN=${NOTIFICATION_INTERNAL_TOKEN:-dev-gateway-internal-token-change-me}
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/organization-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  friend-service:
    build: ./services/friend-service
    container_name: enterprise-friend-service
    env_file:
      - .env
      - ./services/friend-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CHAT_SERVICE_URL=http://chat-service:3006
      - CHAT_INTERNAL_TOKEN=${CHAT_INTERNAL_TOKEN:-dev-shared-chat-internal-token-change-me}
      - USER_SERVICE_INTERNAL_TOKEN=${USER_SERVICE_INTERNAL_TOKEN}
    depends_on:
      - mongodb
      - redis
      - auth-service
      - user-service
      - chat-service
    networks:
      - enterprise-network
    volumes:
      - ./services/friend-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  role-permission-service:
    build: ./services/role-permission-service
    container_name: enterprise-role-permission-service
    env_file:
      - .env
      - ./services/role-permission-service/.env
    depends_on:
      - mongodb
      - redis
      - organization-service
    networks:
      - enterprise-network
    volumes:
      - ./services/role-permission-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  chat-service:
    build: ./services/chat-service
    container_name: enterprise-chat-service
    env_file:
      - .env
      - ./services/chat-service/.env
    environment:
      - CHAT_INTERNAL_TOKEN=${CHAT_INTERNAL_TOKEN:-dev-shared-chat-internal-token-change-me}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-voicehub}:${RABBITMQ_PASS:-voicehub-dev-change-me}@rabbitmq:5672
      - FRIEND_DM_USE_QUEUE=${FRIEND_DM_USE_QUEUE:-true}
      - REALTIME_INTERNAL_TOKEN=${REALTIME_INTERNAL_TOKEN:-dev-shared-realtime-token-change-me}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      organization-service:
        condition: service_started
    networks:
      - enterprise-network
    volumes:
      - ./services/chat-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  task-service:
    build: ./services/task-service
    container_name: enterprise-task-service
    env_file:
      - .env
      - ./services/task-service/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-voicehub}:${RABBITMQ_PASS:-voicehub-dev-change-me}@rabbitmq:5672
      - CHAT_SERVICE_URL=http://chat-service:3006
      - CHAT_INTERNAL_TOKEN=${CHAT_INTERNAL_TOKEN:-dev-shared-chat-internal-token-change-me}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started
      organization-service:
        condition: service_started
    networks:
      - enterprise-network
    volumes:
      - ./services/task-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  ai-task-service:
    build: ./services/ai-task-service
    container_name: enterprise-ai-task-service
    env_file:
      - .env
      - ./services/ai-task-service/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-voicehub}:${RABBITMQ_PASS:-voicehub-dev-change-me}@rabbitmq:5672
      - CHAT_SERVICE_URL=http://chat-service:3006
      - CHAT_INTERNAL_TOKEN=${CHAT_INTERNAL_TOKEN:-dev-shared-chat-internal-token-change-me}
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - enterprise-network
    volumes:
      - ./services/ai-task-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  ai-task-worker:
    build: ./services/ai-task-worker
    container_name: enterprise-ai-task-worker
    env_file:
      - .env
      - ./services/ai-task-worker/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-voicehub}:${RABBITMQ_PASS:-voicehub-dev-change-me}@rabbitmq:5672
      - CHAT_SERVICE_URL=http://chat-service:3006
      - CHAT_INTERNAL_TOKEN=${CHAT_INTERNAL_TOKEN:-dev-shared-chat-internal-token-change-me}
      - USER_SERVICE_URL=http://user-service:3004
      - USER_SERVICE_INTERNAL_TOKEN=${USER_SERVICE_INTERNAL_TOKEN}
      - TASK_SERVICE_URL=http://task-service:3009
      - OLLAMA_BASE_URL=http://ollama:11434
      - PADDLEOCR_BASE_URL=http://paddleocr-service:8000
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
      paddleocr-service:
        condition: service_started
      ai-task-service:
        condition: service_started
    networks:
      - enterprise-network
    volumes:
      - ./services/ai-task-worker:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/worker.js"]

  document-service:
    build: ./services/document-service
    container_name: enterprise-document-service
    env_file:
      - .env
      - ./services/document-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/document-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  voice-service:
    build: ./services/voice-service
    container_name: enterprise-voice-service
    ports:
      - "3005:3005"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    env_file:
      - .env
      - ./services/voice-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/voice-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  notification-service:
    build: ./services/notification-service
    container_name: enterprise-notification-service
    env_file:
      - .env
      - ./services/notification-service/.env
    environment:
      - NOTIFICATION_INTERNAL_TOKEN=${NOTIFICATION_INTERNAL_TOKEN:-dev-gateway-internal-token-change-me}
    depends_on:
      - mongodb
      - redis
    networks:
      - enterprise-network
    volumes:
      - ./services/notification-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

  # Webhook từ bên ngoài (Stripe, …) cần route public — thêm ports: ["3016:3016"] tạm nếu không dùng reverse proxy.
  webhook-service:
    build: ./services/webhook-service
    container_name: enterprise-webhook-service
    env_file:
      - .env
      - ./services/webhook-service/.env
    environment:
      - NOTIFICATION_INTERNAL_TOKEN=${NOTIFICATION_INTERNAL_TOKEN:-dev-gateway-internal-token-change-me}
    depends_on:
      - notification-service
    networks:
      - enterprise-network
    volumes:
      - ./services/webhook-service:/app

  socket-service:
    build: ./services/socket-service
    container_name: enterprise-socket-service
    expose:
      - "3017"
    env_file:
      - .env
      - ./services/socket-service/.env
    environment:
      - USER_SERVICE_URL=http://user-service:3004
      - USER_SERVICE_INTERNAL_TOKEN=${USER_SERVICE_INTERNAL_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-voicehub}:${RABBITMQ_PASS:-voicehub-dev-change-me}@rabbitmq:5672
      - FRIEND_DM_USE_QUEUE=${FRIEND_DM_USE_QUEUE:-true}
      - REALTIME_INTERNAL_TOKEN=${REALTIME_INTERNAL_TOKEN:-dev-shared-realtime-token-change-me}
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      chat-service:
        condition: service_started
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - enterprise-network
    volumes:
      - ./services/socket-service:/app
      - ./shared:/shared
      - /app/node_modules
    command: ["sh", "-c", "npm ci || npm install; node src/server.js"]

networks:
  enterprise-network:
    driver: bridge

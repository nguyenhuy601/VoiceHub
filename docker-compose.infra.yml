# Hạ tầng: MongoDB + Redis + volumes + network dùng chung
# Thường không cần chạy riêng — đã gộp trong `docker-compose.yml` (include).
# Chạy riêng: docker compose -f docker-compose.infra.yml up -d

services:
  mongodb:
    image: mongo:7
    container_name: enterprise-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - enterprise-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise-network

  # Message broker: DM friend async (socket-service → chat-service)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: enterprise-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-voicehub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-voicehub-dev-change-me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - enterprise-network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  enterprise-network:
    driver: bridge
